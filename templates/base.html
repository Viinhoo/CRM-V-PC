<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VP Company</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            background: #111827;
            min-height: 100vh;
        }

        .sidebar .nav-link {
            color: #cbd5e1;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .sidebar .nav-link:hover {
            background-color: #1e293b;
            color: #38bdf8;
        }

        .sidebar .nav-link i {
            margin-right: 8px;
        }

        .navbar {
            background-color: #111827;
        }

        .content {
            padding: 25px;
        }

        @media (min-width: 992px) {
            .sidebar {
                position: fixed;
                width: 250px;
            }

            .content {
                margin-left: 250px;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR MOBILE -->
<nav class="navbar navbar-dark d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="bi bi-list"></i>
        </button>
        <span class="navbar-brand mb-0 h1">VP Company</span>
    </div>
</nav>

<!-- SIDEBAR -->
<div class="offcanvas-lg offcanvas-start sidebar text-white p-3" tabindex="-1" id="sidebarMenu">

    <h4 class="text-center mb-4 text-info">VP Company</h4>

    <ul class="nav flex-column">

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard') }}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('clientes') }}">
                <i class="bi bi-person-badge-fill"></i> Clientes
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('produtos') }}">
                <i class="bi bi-box-seam-fill"></i> Produtos
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('venda') }}">
                <i class="bi bi-cash-coin"></i> Registrar Venda
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('historico') }}">
                <i class="bi bi-clock-history"></i> Histórico
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('usuarios') }}">
                <i class="bi bi-shield-lock-fill"></i> Usuários
            </a>
        </li>

        <li class="nav-item mt-3">
            <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </li>

    </ul>
</div>

<!-- CONTEÚDO -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
