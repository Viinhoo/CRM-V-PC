{% extends "base.html" %}
{% block content %}

<h2>Produtos</h2>

<div class="card-dark mb-4">
    <h4>Novo Produto</h4>
    <form method="POST">
        <input type="text" name="nome" placeholder="Nome do Produto" required>
        <input type="number" step="0.01" name="preco_venda" placeholder="Preço de Venda" required>
        <input type="number" step="0.01" name="custo" placeholder="Custo" required>
        <input type="number" name="estoque" placeholder="Estoque Inicial" required>
        <button type="submit">Adicionar Produto</button>
    </form>
</div>

<div class="card-dark">
    <h4>Lista de Produtos</h4>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Custo</th>
                <th>Estoque</th>
            </tr>
        </thead>
        <tbody>
            {% for p in produtos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nome }}</td>
                <td>R$ {{ p.preco_venda }}</td>
                <td>R$ {{ p.custo }}</td>
                <td>{{ p.estoque }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
